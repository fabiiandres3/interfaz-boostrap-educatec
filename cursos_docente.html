<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="dashboard_docente.css">
</head>

<body>

    <div class="wrapper">
        <aside class="sidebar">

            <div class="logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>Educatec</span>
            </div>

            <ul class="menu">

                <li onclick="window.location='dashboard_docente.html'">
                    <i class="fa-solid fa-house"></i>
                    Inicio
                </li>

                <li class="active">
                    <i class="fa-solid fa-school"></i>
                    Mis Cursos
                </li>

                <li onclick="window.location='tarea_docente.html'">
                    <i class="fa-solid fa-book"></i>
                    Tareas
                </li>

                <li onclick="window.location='calificaciones_docente.html'">
                    <i class="fa-solid fa-chart-column"></i>
                    Calificaciones
                </li>

                <li onclick="window.location='asistencia_docente.html'">
                    <i class="fa-solid fa-calendar-check"></i>
                    Asistencia
                </li>

                <li onclick="window.location='mensajes_docente.html'">
                    <i class="fa-solid fa-envelope"></i>
                    Mensajes
                </li>

                <li onclick="window.location='configuracion_docente.html'">
                    <i class="fa-solid fa-gear"></i>
                    Configuración
                </li>

                <li onclick="window.location='index.html'">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Cerrar Sesión
                </li>

            </ul>

        </aside>

    <main class="content">

        <div class="section-card">

            <div class="topbar-card">

                <h3>Mis Grados Asignados</h3>

                <button class="btn-save">
                    + Nuevo Curso
                </button>

            </div>

        </div>

        <div class="stats">

            <div class="stat-card">
                <div class="icon blue">
                    <i class="fa-solid fa-school"></i>
                </div>
                <h3>8</h3>
                <p>Grados</p>
            </div>

            <div class="stat-card">
                <div class="icon green">
                    <i class="fa-solid fa-users"></i>
                </div>
                <h3>350</h3>
                <p>Estudiantes</p>
            </div>

            <div class="stat-card">
                <div class="icon orange">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <h3>4.5</h3>
                <p>Promedio</p>
            </div>

            <div class="stat-card">
                <div class="icon purple">
                    <i class="fa-solid fa-book"></i>
                </div>
                <h3>12</h3>
                <p>Materias</p>
            </div>

        </div>

        <div class="section-card">

            <table>

                <thead>
                    <tr>
                        <th>Grado</th>
                        <th>Materia</th>
                        <th>Estudiantes</th>
                        <th>Promedio</th>
                        <th>Acción</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>
                        <td>8°A</td>
                        <td>Matemáticas</td>
                        <td>35</td>
                        <td class="good">4.5</td>
                        <td>
                            <button class="btn-save">
                                Ver
                            </button>
                        </td>
                    </tr>

                    <tr>
                        <td>9°A</td>
                        <td>Matemáticas</td>
                        <td>38</td>
                        <td class="good">4.3</td>
                        <td>
                            <button class="btn-save">
                                Ver
                            </button>
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>
    </main>
    </div>
</body>

</html>
