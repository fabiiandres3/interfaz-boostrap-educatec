<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dashboard_docente.css">
</head>

<body>
    <div class="wrapper">

    <aside class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>Educatec</span>
        </div>

        <ul class="menu">

            <li onclick="window.location='dashboard_docente.html'">
                <i class="fa-solid fa-house"></i>
                Inicio
            </li>

            <li onclick="window.location='cursos_docente.html'">
                <i class="fa-solid fa-school"></i>
                Mis Cursos
            </li>

            <li onclick="window.location='grados_docente.html'">
                <i class="fa-solid fa-layer-group"></i>
                Mis Grados
            </li>

            <li onclick="window.location='tarea_docente.html'">
                <i class="fa-solid fa-book"></i>
                Tareas
            </li>

            <li onclick="window.location='calificaciones_docente.html'">
                <i class="fa-solid fa-chart-column"></i>
                Calificaciones
            </li>

            <li onclick="window.location='asistencia_docente.html'">
                <i class="fa-solid fa-calendar-check"></i>
                Asistencia
            </li>

            <li onclick="window.location='mensajes_docente.html'">
                <i class="fa-solid fa-envelope"></i>
                Mensajes
            </li>

            <li class="active">
                <i class="fa-solid fa-gear"></i>
                Configuración
            </li>

            <li onclick="window.location='index.html'">
                <i class="fa-solid fa-right-from-bracket"></i>
                Cerrar Sesión
            </li>

        </ul>

    </aside>

    <main class="content">

    <div class="section-card">

        <h3>Configuración de Cuenta</h3>

        <br>

        <div class="config-grid">

            <div>

                <label>Nombre Completo</label>

                <input type="text" class="config-input" value="Carlos Pérez">

            </div>

            <div>

                <label>Correo Electrónico</label>

                <input type="email" class="config-input" value="carlos@educatec.com">

            </div>

            <div>

                <label>Teléfono</label>

                <input type="text" class="config-input" value="3001234567">

            </div>

            <div>

                <label>Materia</label>

                <input type="text" class="config-input" value="Matemáticas">

            </div>

        </div>

        <br>

        <button class="btn-save">
            Guardar Cambios
        </button>

    </div>

    <div class="section-card">

        <h3>Seguridad</h3>

        <br>

        <div class="config-grid">

            <div>

                <label>Contraseña Actual</label>

                <input type="password" class="config-input">

            </div>

            <div>

                <label>Nueva Contraseña</label>

                <input type="password" class="config-input">

            </div>

            <div>

                <label>Confirmar Contraseña</label>

                <input type="password" class="config-input">

            </div>

        </div>

        <br>

        <button class="btn-save">
            Actualizar Contraseña
        </button>

    </div>

    <div class="section-card">

        <h3>Preferencias</h3>

        <br>

        <div class="preferences">

            <label>
                <input type="checkbox" checked>
                Recibir notificaciones por correo
            </label>

            <br><br>

            <label>
                <input type="checkbox" checked>
                Mostrar recordatorios académicos
            </label>

        </div>

    </div>
</main>
</div>
</body>

</html>
